<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="2.css">
  <title>SecureKit</title>
</head>
<body>

<h1>SecureKit</h1>

<hr>

<h3>Password Checker</h3>
<input type="password" id="passwordInput" placeholder="enter password">
<p>Requirements:</p>
<ul>
  <li id="length">8+ characters</li>
  <li id="upper">Uppercase letter</li>
  <li id="lower">Lowercase letter</li>
  <li id="number">Number</li>
  <li id="symbol">Symbol</li>
</ul>

<hr>

<h3>Password Generator</h3>
<p>Length:</p>
<input type="range" id="slider" min="8" max="64" value="16">
<br><br>
<button id="genButton">Generate Password</button>
<p id="genOutput"></p>

<hr>

<script src="2.js"></script>
</body>
</html>
